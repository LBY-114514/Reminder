<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>挑战杯提醒助手</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Challenge Cup Reminder</p>
          <h1>挑战杯事项提醒</h1>
          <p class="hero-copy">记录申报、材料和截止时间，按时处理每一条提醒。</p>
        </div>
      </header>

      <section class="notice-grid" aria-label="提醒概览">
        <article class="panel next-panel">
          <div class="panel-heading">
            <span class="badge">下一条</span>
            <h2>下一条待处理提醒</h2>
          </div>
          <div id="nextReminder" class="next-reminder">正在加载提醒...</div>
        </article>

        <article class="panel alert-panel">
          <div class="panel-heading">
            <span class="badge badge-hot">程序内提醒</span>
            <h2>到期提醒</h2>
          </div>
          <div id="appAlert" class="app-alert" role="status" aria-live="polite">
            暂无到期提醒。
          </div>
        </article>
      </section>

      <section class="panel data-panel" aria-labelledby="dataLocationTitle">
        <div class="panel-heading">
          <span class="badge">数据位置</span>
          <h2 id="dataLocationTitle">JSON 保存路径</h2>
        </div>
        <div class="data-location-row">
          <div id="dataLocation" class="data-location">正在加载数据位置...</div>
          <button type="button" id="changeDataLocation" class="ghost-button">选择文件夹</button>
        </div>
        <div class="manual-location-row">
          <input id="manualDataFolder" type="text" placeholder="也可以直接粘贴文件夹路径，例如 D:\ReminderData" />
          <button type="button" id="saveManualDataFolder" class="primary-button">保存到这个文件夹</button>
        </div>
      </section>

      <section class="panel startup-panel" aria-labelledby="startupTitle">
        <div class="panel-heading">
          <span class="badge">启动设置</span>
          <h2 id="startupTitle">开机自动启动</h2>
        </div>
        <div class="startup-row">
          <div>
            <div id="startupStatus" class="startup-status">正在加载开机启动状态...</div>
            <p class="startup-tip">开启后请不要移动 exe 文件位置，否则开机启动会失效。</p>
          </div>
          <div class="startup-actions">
            <button type="button" id="enableStartup" class="primary-button">开启开机启动</button>
            <button type="button" id="disableStartup" class="ghost-button">关闭开机启动</button>
          </div>
        </div>
      </section>

      <section class="panel form-panel" aria-labelledby="formTitle">
        <div class="panel-heading">
          <span class="badge">编辑区</span>
          <h2 id="formTitle">新增提醒</h2>
        </div>
        <form id="issueForm" class="issue-form">
          <input type="hidden" id="issueId" />
          <label>
            标题
            <input id="title" name="title" type="text" maxlength="100" required placeholder="例如：提交项目申报书" />
          </label>
          <label>
            提醒时间
            <input id="remindAt" name="remindAt" type="datetime-local" required />
          </label>
          <label class="wide">
            详情
            <textarea id="detail" name="detail" rows="4" placeholder="补充说明、材料清单或负责人"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="primary-button">保存提醒</button>
            <button type="button" id="cancelEdit" class="ghost-button" hidden>取消编辑</button>
          </div>
        </form>
      </section>

      <section class="panel list-panel" aria-labelledby="listTitle">
        <div class="list-header">
          <div class="panel-heading">
            <span class="badge">事项列表</span>
            <h2 id="listTitle">全部问题</h2>
          </div>
          <div class="filters" role="group" aria-label="筛选问题">
            <button type="button" class="filter-button active" data-filter="all">全部</button>
            <button type="button" class="filter-button" data-filter="pending">待处理</button>
            <button type="button" class="filter-button" data-filter="done">已处理</button>
          </div>
        </div>
        <div id="issueList" class="issue-list">正在加载问题列表...</div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
